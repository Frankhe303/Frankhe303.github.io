<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EldCare 技术详情</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--c:rgba(12,20,35,.85);--ch:rgba(18,30,50,.95);--l:rgba(0,180,255,.12);--la:rgba(0,212,255,.5);--cy:#00d4ff;--cyd:rgba(0,212,255,.6);--cya:rgba(0,212,255,.12);--bl:#0088ff;--pu:#7c3aed;--gr:#10b981;--am:#f59e0b;--re:#ef4444;--t:#e2e8f0;--td:#94a3b8;--tm:#64748b;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--sans);background:var(--bg);color:var(--t);line-height:1.7;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,.025)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025)1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.glow{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;animation:gp 8s ease infinite alternate}
.g1{top:-150px;right:-150px;background:radial-gradient(circle,rgba(0,100,255,.06),transparent)}
.g2{bottom:-150px;left:-150px;background:radial-gradient(circle,rgba(124,58,237,.04),transparent);animation-delay:-4s}
@keyframes gp{0%,100%{opacity:.5}50%{opacity:1}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--cya);border-radius:2px}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:.7rem 2rem;background:linear-gradient(180deg,rgba(6,8,15,.95)0%,transparent 100%);display:flex;justify-content:space-between;align-items:center}
.topbar .back{color:var(--cyd);text-decoration:none;font-size:.8rem;display:flex;align-items:center;gap:.4rem}
.topbar .back:hover{color:var(--cy)}
.topbar .title{font-size:.85rem;font-weight:600;background:linear-gradient(135deg,var(--cy),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.hero-bar{z-index:1;padding:6rem 2rem 3rem;max-width:1000px;margin:0 auto;text-align:center}
.hero-bar .tag{display:inline-block;font-size:.65rem;letter-spacing:.15em;color:var(--cyd);text-transform:uppercase;padding:.2rem .9rem;border:1px solid var(--cya);border-radius:100px;margin-bottom:.8rem}
.hero-bar h1{font-size:clamp(1.6rem,3vw,2.5rem);font-weight:700;margin-bottom:.4rem}
.hero-bar p{color:var(--td);font-size:.9rem;max-width:600px;margin:0 auto;font-weight:300}

.sec{z-index:1;max-width:1000px;margin:0 auto;padding:0 2rem 4rem}
.sec .sec-title{font-size:1.1rem;font-weight:600;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:.6rem}
.sec .sub{font-size:.85rem;color:var(--td);line-height:1.8;margin-bottom:1.2rem}
.sec .sub strong{color:var(--t)}

.vis{background:var(--c);border:1px solid var(--l);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;overflow:hidden}
.vis .vlabel{font-size:.7rem;color:var(--tm);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.8rem;text-align:center}

.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-box{background:var(--c);border:1px solid var(--l);border-radius:12px;padding:1rem;text-align:center}
.stat-box .n{font-family:var(--mono);font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--cy),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-box .l{font-size:.7rem;color:var(--tm);margin-top:.2rem}
.stat-box .bar{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:.5rem;overflow:hidden}
.stat-box .bar-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cy),var(--bl));transition:width 2s}

.tbl-wrap{overflow-x:auto;margin:1rem 0}
.tbl{width:100%;border-collapse:collapse;font-size:.78rem}
.tbl th{padding:.4rem .6rem;color:var(--tm);font-weight:500;font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid rgba(255,255,255,.05);text-align:left}
.tbl td{padding:.4rem .6rem;color:var(--td);border-bottom:1px solid rgba(255,255,255,.03)}
.tbl tr:hover td{color:var(--t)}
.tbl .hl{color:var(--cy);font-weight:600;font-family:var(--mono)}
.tbl .tag{display:inline-block;font-size:.6rem;padding:.1rem .5rem;border-radius:100px}
.tag-cy{background:rgba(0,212,255,.1);color:var(--cyd);border:1px solid rgba(0,212,255,.15)}
.tag-gr{background:rgba(16,185,129,.1);color:var(--gr);border:1px solid rgba(16,185,129,.15)}
.tag-am{background:rgba(245,158,11,.1);color:var(--am);border:1px solid rgba(245,158,11,.15)}
.tag-re{background:rgba(239,68,68,.1);color:var(--re);border:1px solid rgba(239,68,68,.15)}
.tag-pu{background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.15)}

.spec-item{background:rgba(0,0,0,.2);border:1px solid var(--l);border-radius:8px;padding:.6rem .8rem}
.spec-item .sl{font-size:.65rem;color:var(--tm);text-transform:uppercase;letter-spacing:.04em}
.spec-item .sv{font-size:.85rem;font-weight:600;font-family:var(--mono);margin-top:.15rem;color:var(--t)}

.flex-row{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1rem}
.chip{display:inline-flex;align-items:center;gap:.3rem;font-size:.7rem;padding:.25rem .7rem;border-radius:100px;font-family:var(--mono)}
.chip-cy{background:rgba(0,212,255,.08);color:var(--cyd);border:1px solid rgba(0,212,255,.12)}
.chip-gr{background:rgba(16,185,129,.08);color:var(--gr);border:1px solid rgba(16,185,129,.12)}

.lvl{display:flex;gap:.6rem;flex-wrap:wrap;margin:1rem 0}
.lvl-item{flex:1;min-width:120px;background:var(--c);border:1px solid var(--l);border-radius:10px;padding:.8rem;text-align:center}
.lvl-item .lv{font-family:var(--mono);font-size:.9rem;font-weight:700;margin-bottom:.2rem}
.lvl-item .ld{font-size:.7rem;color:var(--td)}
.lvl-item .ll{font-size:.6rem;color:var(--tm);margin-top:.3rem;font-family:var(--mono)}
.arrow-chain{display:flex;align-items:center;justify-content:center;gap:.3rem;flex-wrap:wrap;margin:1rem 0}
.arrow-chain .ac-item{padding:.4rem .7rem;background:var(--c);border:1px solid var(--l);border-radius:8px;font-size:.72rem;text-align:center;min-width:60px;flex:1}
.arrow-chain .ac-item .ac-main{font-weight:500}
.arrow-chain .ac-item .ac-sub{font-size:.6rem;color:var(--tm);font-family:var(--mono)}
.arrow-chain .ac-arr{color:var(--cyd);font-size:1rem}

.flow3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1rem 0}
@media(max-width:768px){.flow3{grid-template-columns:1fr}}
.flow-item{background:var(--c);border:1px solid var(--l);border-radius:12px;padding:1rem;position:relative}
.flow-item .fi-n{font-family:var(--mono);font-size:.9rem;font-weight:700;color:var(--cy);margin-bottom:.3rem}
.flow-item .fi-t{font-size:.85rem;font-weight:600;margin-bottom:.3rem}
.flow-item .fi-d{font-size:.75rem;color:var(--td)}
.flow-item .fi-c{font-size:.65rem;color:var(--tm);font-family:var(--mono);margin-top:.4rem;padding-top:.4rem;border-top:1px solid rgba(255,255,255,.05)}

.num-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.6rem;margin:1rem 0}
.num-item{text-align:center;padding:.6rem;background:rgba(0,0,0,.2);border-radius:8px;border:1px solid var(--l)}
.num-item .nn{font-family:var(--mono);font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--cy),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.num-item .nl{font-size:.62rem;color:var(--tm);margin-top:.1rem}

.foot{z-index:1;text-align:center;padding:2rem;color:var(--tm);font-size:.7rem;border-top:1px solid rgba(255,255,255,.03)}
@media(max-width:768px){.hero-bar{padding:5rem 1rem 2rem}.sec{padding:0 1rem 2rem}}
</style>
</head>

<script>
var sections = {
